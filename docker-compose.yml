services:
  postgres:
    image: postgres:16
    container_name: eagp-postgres
    environment:
      POSTGRES_USER: eagp
      POSTGRES_PASSWORD: eagp
      POSTGRES_DB: eagp
    ports:
      - "5432:5432"
    volumes:
      - eagp_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: eagp-redis
    ports:
      - "6379:6379"

volumes:
  eagp_postgres:
